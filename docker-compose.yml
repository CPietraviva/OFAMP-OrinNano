services:
  timesfm-app:
    image: timesfm-ui
    container_name: timesfm-ui
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - STREAMLIT_SERVER_PORT=8501
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: streamlit run /app/ofamp_app.py
    restart: "no"